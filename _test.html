<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>Agenda Villamax</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
body {
    font-family: Arial, sans-serif;
    margin: 20px;
    background-color: #f8f9fa;
}
h2 { margin-top: 40px; }
#summary div {
    display: inline-block;
    margin-right: 30px;
    font-weight: bold;
}
table {
    width: 100%;
    border-collapse: collapse;
    margin-top: 20px;
}
th, td {
    border: 1px solid #ddd;
    padding: 6px;
}
th {
    background-color: #343a40;
    color: white;
    text-align: center;
}
td {
    padding: 6px;
}
td.text-left { text-align: left; }
td.text-center { text-align: center; }
td.text-right { text-align: right; }
tr.pos { background-color: #d4edda; } /* verde chiaro per entrata positiva */
tr.neg { background-color: #f8d7da; } /* rosso chiaro per uscita maggiore */
.indicator {
    display: inline-block;
    width: 16px; height: 16px;
    border-radius: 50%;
    margin-left: 4px;
}
</style>
</head>
<body>

<h1>Agenda Villamax - Analisi Economica</h1>

<div id="summary">
    <div>Ultimi 3 mesi: <span id="sum3"></span></div>
    <div>Ultimi 6 mesi: <span id="sum6"></span></div>
    <div>Ultimo anno: <span id="sum12"></span></div>
    <div>Ultimi 3 anni: <span id="sum36"></span></div>
</div>

<label for="monthSlider">Seleziona numero di mesi da visualizzare:</label>
<input type="range" id="monthSlider" min="1" max="60" value="12" step="1">
<span id="monthValue">12</span>

<h2>Tabella Mensile</h2>
<table id="dataTable">
    <thead>
        <tr>
            <th>Anno</th>
            <th>Mese</th>
            <th>Entrate</th>
            <th>Uscite</th>
            <th>Diff (V)</th>
            <th>D</th>
            <th>Importanza</th>
        </tr>
    </thead>
    <tbody></tbody>
</table>

<h2>Grafico Annuale</h2>
<canvas id="annualChart" height="150"></canvas>

<h2>Grafico Mensile</h2>
<canvas id="monthlyChart" height="150"></canvas>

<script>
// --- JSON dati dalla funzione Azure ---
let jsonData = []; // qui metti la risposta JSON completa della Azure Function

// --- Formattazione numeri con separatore migliaia ---
function formatNumber(n) {
    if (n == null) return '-';
    let isNegative = n < 0;
    let num = Math.trunc(Math.abs(n));
    let str = num.toString();
    let result = '';
    while(str.length > 3) {
        result = '.' + str.slice(-3) + result;
        str = str.slice(0,-3);
    }
    result = str + result;
    if (isNegative) result = '-' + result;
    if (result.includes('..')) result = result.replace('..','.');
    return result;
}

// --- Calcolo indicatori di importanza ---
function calculateImportance(data) {
    const total = data.reduce((acc, r) => acc + Math.abs(r.V), 0);
    return data.map(r => {
        let pct = total ? Math.abs(r.V)/total : 0;
        if (pct > 0.2) return 'red';
        if (pct > 0.1) return 'orange';
        return 'green';
    });
}

// --- Popolamento tabella ---
function populateTable(data) {
    const tbody = document.querySelector('#dataTable tbody');
    tbody.innerHTML = '';
    const icons = calculateImportance(data);
    data.forEach((row,i) => {
        const tr = document.createElement('tr');
        tr.className = row.V >= 0 ? 'pos' : 'neg';
        tr.innerHTML = `
            <td class="text-center">${row.Anno}</td>
            <td class="text-left">${row.DMese}</td>
            <td class="text-right">${formatNumber(row.ImpA)}</td>
            <td class="text-right">${formatNumber(row.ImpD)}</td>
            <td class="text-right">${formatNumber(row.V)}</td>
            <td class="text-center">${row.D}</td>
            <td class="text-center"><span class="indicator" style="background-color:${icons[i]}"></span></td>
        `;
        tbody.appendChild(tr);
    });
}

// --- Calcolo somma ultimi n mesi ---
function sumLastMonths(data, months) {
    return Math.trunc(data.sort((a,b)=> (b.Anno*12+b.Mese)-(a.Anno*12+a.Mese)).slice(0,months).reduce((acc,r)=>acc+r.V,0));
}

// --- Popolamento riepilogo ---
function populateSummary(data) {
    document.getElementById('sum3').textContent = formatNumber(sumLastMonths(data,3));
    document.getElementById('sum6').textContent = formatNumber(sumLastMonths(data,6));
    document.getElementById('sum12').textContent = formatNumber(sumLastMonths(data,12));
    document.getElementById('sum36').textContent = formatNumber(sumLastMonths(data,36));
}

// --- Grafico Annuale ---
let annualChart = new Chart(document.getElementById('annualChart'), {
    type: 'bar',
    data: { labels: [], datasets: [{label:'Differenza V', data:[], backgroundColor: '#007bff'}] },
    options: { responsive:true, scales:{y:{beginAtZero:true}} }
});
function updateAnnualChart(data) {
    const grouped = {};
    data.forEach(r => {
        grouped[r.Anno] = (grouped[r.Anno] || 0) + r.V;
    });
    const labels = Object.keys(grouped).sort();
    annualChart.data.labels = labels;
    annualChart.data.datasets[0].data = labels.map(l=>grouped[l]);
    annualChart.update();
}

// --- Grafico Mensile con slider ---
let monthlyChart = new Chart(document.getElementById('monthlyChart'), {
    type: 'bar',
    data: { labels: [], datasets: [{label:'Differenza V', data:[], backgroundColor: '#28a745'}] },
    options: { responsive:true, scales:{y:{beginAtZero:true}} }
});

const monthSlider = document.getElementById('monthSlider');
const monthValue = document.getElementById('monthValue');
monthSlider.addEventListener('input', ()=>{
    const monthsToShow = parseInt(monthSlider.value);
    monthValue.textContent = monthsToShow;
    updateMonthlyChart(monthsToShow);
});

function updateMonthlyChart(months) {
    const filtered = jsonData
        .sort((a,b)=> (b.Anno*12+b.Mese)-(a.Anno*12+a.Mese))
        .slice(0,months)
        .reverse();
    monthlyChart.data.labels = filtered.map(r=>`${r.DMese} ${r.Anno}`);
    monthlyChart.data.datasets[0].data = filtered.map(r=>r.V);
    monthlyChart.update();
}

// --- Inizializzazione ---
function init() {
    // Assicurati che jsonData contenga la risposta Azure
    jsonData.sort((a,b)=> (b.Anno*12+b.Mese)-(a.Anno*12+a.Mese));
    populateSummary(jsonData);
    populateTable(jsonData);
    updateAnnualChart(jsonData);
    updateMonthlyChart(parseInt(monthSlider.value));
}

// Esegui init dopo aver impostato jsonData
init();
</script>

</body>
</html>
