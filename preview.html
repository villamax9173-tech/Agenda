<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8"/>
<title>Agenda Villamax</title>

<link href="https://cdn.jsdelivr.net/npm/fullcalendar@5.11.5/main.min.css" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/fullcalendar@5.11.5/main.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>

<style>

body{
margin:0;
font-family:'Segoe UI',Roboto,Arial;
background:#f1f3f4;
}

h2{
padding:20px;
margin:0;
background:white;
border-bottom:1px solid #e0e0e0;
}

#calendar{
max-width:1400px;
margin:30px auto;
background:white;
padding:20px;
border-radius:12px;
box-shadow:0 4px 18px rgba(0,0,0,0.08);
}

.fc-daygrid-event-dot{display:none!important;}

.fc-event{
border:none!important;
border-radius:6px!important;
padding:3px 6px!important;
font-size:12px;
cursor:pointer;
}

/* FILTRI */

#filters{
max-width:1400px;
margin:20px auto;
display:flex;
gap:15px;
flex-wrap:wrap;
}

.filter-btn{
padding:6px 12px;
border-radius:20px;
border:1px solid #ccc;
cursor:pointer;
background:white;
}

.filter-active{
background:#1a73e8;
color:white;
border:none;
}

/* MODAL */

.modal{
display:none;
position:fixed;
z-index:2000;
left:0;
top:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.3);
}

.modal-content{
background:white;
width:380px;
margin:10% auto;
padding:20px;
border-radius:10px;
box-shadow:0 10px 30px rgba(0,0,0,0.2);
}

.modal input,
.modal textarea,
.modal select{
width:100%;
margin-bottom:10px;
padding:8px;
border:1px solid #ccc;
border-radius:6px;
font-size:14px;
}

.modal-buttons{
display:flex;
justify-content:space-between;
margin-top:10px;
}

button{
padding:6px 10px;
border:none;
border-radius:6px;
cursor:pointer;
}

.btn-save{background:#1a73e8;color:white;}
.btn-delete{background:#d93025;color:white;}
.btn-cancel{background:#e0e0e0;}

.tooltip{
position:absolute;
background:#202124;
color:white;
padding:6px 8px;
border-radius:6px;
font-size:12px;
pointer-events:none;
opacity:0;
}

</style>
</head>

<body>

<h2>Agenda Villamax</h2>

<div id="filters">
<div class="filter-btn filter-active" data-type="ALL">Tutti</div>
<div class="filter-btn" data-type="P">P</div>
<div class="filter-btn" data-type="S">S</div>
<div class="filter-btn" data-type="M">M</div>
<div class="filter-btn" data-type="C">C</div>
<div class="filter-btn" data-type="A">A</div>
<div class="filter-btn" data-type="L">L</div>
</div>

<div id="calendar"></div>

<div id="tooltip" class="tooltip"></div>

<div id="eventModal" class="modal">
<div class="modal-content">

<h3>Evento</h3>

<input id="evTitle" placeholder="Titolo">

<select id="evTipo">
<option value="P">P</option>
<option value="S">S</option>
<option value="M">M</option>
<option value="C">C</option>
<option value="A">A</option>
<option value="L">L</option>
</select>

<textarea id="evDesc" placeholder="Descrizione"></textarea>

<div class="modal-buttons">
<button class="btn-save" id="saveEvent">Salva</button>
<button class="btn-delete" id="deleteEvent">Elimina</button>
<button class="btn-cancel" id="closeModal">Chiudi</button>
</div>

</div>
</div>

<script>

document.addEventListener('DOMContentLoaded',function(){

const API_BASE="https://agendavillamaxapi-dyhrhdhzdzewh5hz.canadacentral-01.azurewebsites.net/api";
const API_KEY="I-rrqvXKD9iosCOpeRZbyFEuhXI_HuPb2QZoGpMU95g9AzFuuPP7BQ==";

let currentId=null;
let currentDate=null;
let filter="ALL";

const tooltip=document.getElementById("tooltip");

const calendar=new FullCalendar.Calendar(document.getElementById('calendar'),{

initialView:'dayGridMonth',
locale:'it',
firstDay:1,
eventDisplay:'block',

headerToolbar:{
left:'prev,next today',
center:'title',
right:'dayGridMonth,timeGridWeek,timeGridDay'
},

events:loadEvents,

dateClick:function(info){

currentId=null;
currentDate=info.date;

openModal("", "P", "");

},

eventClick:function(info){

currentId=info.event.extendedProps.id;
currentDate=info.event.start;

openModal(
info.event.title,
info.event.extendedProps.tipo,
info.event.extendedProps.desc
);

},

eventMouseEnter:function(info){

tooltip.innerHTML="<b>"+info.event.title+"</b>";
tooltip.style.opacity=1;

},

eventMouseLeave:function(){
tooltip.style.opacity=0;
},

eventDidMount:function(info){

info.el.addEventListener("mousemove",function(e){

tooltip.style.left=(e.pageX+10)+"px";
tooltip.style.top=(e.pageY+10)+"px";

});

}

});

calendar.render();

async function loadEvents(fetchInfo,successCallback){

const res=await axios.get(`${API_BASE}/GetEvents?code=${API_KEY}`);

const today=new Date();
today.setHours(0,0,0,0);

const events=res.data
.filter(e=> filter==="ALL" || e.tipo===filter)
.map(e=>{

const d=e.data.toString();

const startDate=new Date(
d.substring(0,4),
d.substring(4,6)-1,
d.substring(6,8),
e.ora||0,
e.minuti||0
);

let color="#4285F4";

if(e.tipo==="P") color="#EA4335";
if(e.tipo==="S") color="#34A853";
if(e.tipo==="M") color="#8AB4F8";
if(e.tipo==="C") color="#FDD663";
if(e.tipo==="A") color="#137333";
if(e.tipo==="L") color="#FB8C00";

if(startDate<today) color="#9aa0a6";

return{
title:e.desc_breve,
start:startDate,
backgroundColor:color,
borderColor:color,
textColor:"#fff",
extendedProps:{
id:e.id,
tipo:e.tipo,
desc:e.descrizione
}
};

});

successCallback(events);

}

function openModal(title,tipo,desc){

document.getElementById("evTitle").value=title;
document.getElementById("evTipo").value=tipo;
document.getElementById("evDesc").value=desc;

document.getElementById("eventModal").style.display="block";

}

document.getElementById("closeModal").onclick=function(){

document.getElementById("eventModal").style.display="none";

}

document.getElementById("saveEvent").onclick=async function(){

const titolo=document.getElementById("evTitle").value;
const tipo=document.getElementById("evTipo").value;
const desc=document.getElementById("evDesc").value;

if(currentId==null){

await axios.post(`${API_BASE}/InsertEvent?code=${API_KEY}`,{
data:formatDateToInt(currentDate),
ora:0,
minuti:0,
tipo:tipo,
durata_ore:0,
durata_minuti:0,
desc_breve:titolo,
descrizione:desc
});

}else{

await axios.put(`${API_BASE}/UpdateEvent?code=${API_KEY}`,{
id:currentId,
desc_breve:titolo
});

}

calendar.refetchEvents();

document.getElementById("eventModal").style.display="none";

}

document.getElementById("deleteEvent").onclick=async function(){

if(!currentId) return;

if(!confirm("Eliminare evento?")) return;

await axios.delete(`${API_BASE}/DeleteEvent?code=${API_KEY}`,{
data:{id:currentId}
});

calendar.refetchEvents();

document.getElementById("eventModal").style.display="none";

}

document.querySelectorAll(".filter-btn").forEach(btn=>{

btn.onclick=function(){

document.querySelectorAll(".filter-btn")
.forEach(b=>b.classList.remove("filter-active"));

btn.classList.add("filter-active");

filter=btn.dataset.type;

calendar.refetchEvents();

}

});

function formatDateToInt(date){

const y=date.getFullYear();
const m=(date.getMonth()+1).toString().padStart(2,'0');
const d=date.getDate().toString().padStart(2,'0');

return parseInt(`${y}${m}${d}`);

}

});

</script>

</body>
</html>
