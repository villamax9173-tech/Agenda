<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wanalisi</title>

<style>
body {
    font-family: Arial, sans-serif;
    background-color: #f5f7fa;
    margin: 0;
    padding: 20px;
}

h1 {
    text-align: center;
    margin-bottom: 20px;
}

table {
    width: 100%;
    border-collapse: collapse;
    background: white;
    box-shadow: 0 2px 8px rgba(0,0,0,0.08);
}

thead {
    background-color: #1f2937;
    color: white;
}

th, td {
    padding: 10px;
    text-align: left;
    border-bottom: 1px solid #e5e7eb;
}

tr:hover {
    background-color: #f3f4f6;
}

.entrata {
    color: green;
    font-weight: bold;
}

.uscita {
    color: red;
    font-weight: bold;
}

.loading {
    text-align: center;
    margin-top: 40px;
    font-size: 18px;
}
</style>
</head>

<body>

<h1>Wanalisi</h1>

<div id="loading" class="loading">Caricamento dati...</div>

<table id="wanalisTable" style="display:none;">
    <thead>
        <tr>
            <th>Data</th>
            <th>Causale</th>
            <th>Entrata</th>
            <th>Uscita</th>
            <th>Importo EUR</th>
        </tr>
    </thead>
    <tbody></tbody>
</table>

<script>
const apiUrl = "https://agendavillamaxapi-dyhrhdhzdzewh5hz.canadacentral-01.azurewebsites.net/api/GetEventsWaNALIS?code=I-rrqvXKD9iosCOpeRZbyFEuhXI_HuPb2QZoGpMU95g9AzFuuPP7BQ==";

fetch(apiUrl)
    .then(response => response.json())
    .then(data => {

        const table = document.getElementById("wanalisTable");
        const tbody = table.querySelector("tbody");
        const loading = document.getElementById("loading");

        loading.style.display = "none";
        table.style.display = "table";

        data.forEach(item => {

    const row = document.createElement("tr");

    const dataFormattata = new Date(item.appData)
        .toLocaleDateString("it-IT");

    row.innerHTML = `
        <td>${dataFormattata}</td>
        <td>${item.desc_breve ?? ""}</td>
        <td class="entrata">${item.entrata ?? ""}</td>
        <td class="uscita">${item.uscita ?? ""}</td>
        <td>${item.tipo ?? ""}</td>
    `;

    tbody.appendChild(row);
});
    })
    .catch(error => {
        document.getElementById("loading").innerText = "Errore caricamento dati.";
        console.error("Errore:", error);
    });
</script>

</body>
</html>
