<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>Wanalisi - Agenda Villamax</title>
<style>
    body {
        font-family: Arial, Helvetica, sans-serif;
        margin: 20px;
        background-color: #f8f9fa;
    }

    h2 {
        text-align: center;
        color: #333;
    }

    table {
        width: 100%;
        border-collapse: collapse;
        margin-top: 20px;
        background-color: white;
        box-shadow: 0 2px 6px rgba(0,0,0,0.1);
    }

    th, td {
        border: 1px solid #aaa;
        padding: 8px;
        text-align: left;
        font-size: 0.95rem;
    }

    th {
        background-color: #4CAF50;
        color: white;
        position: sticky;
        top: 0;
        z-index: 2;
    }

    tbody tr:nth-child(even) {
        background-color: #f2f2f2;
    }

    tbody tr:hover {
        background-color: #ddd;
    }

    #loading {
        text-align: center;
        font-weight: bold;
        margin-top: 40px;
    }
</style>
</head>

<body>

<h2>Wanalisi - Dati Completi 1</h2>

<div id="loading">Caricamento dati...</div>

<table id="wanalisTable" style="display:none;">
    <thead></thead>
    <tbody></tbody>
</table>

<script>
const apiUrl = "https://agendavillamaxapi-dyhrhdhzdzewh5hz.canadacentral-01.azurewebsites.net/api/GetEventsWaNALIS?code=I-rrqvXKD9iosCOpeRZbyFEuhXI_HuPb2QZoGpMU95g9AzFuuPP7BQ==";

fetch(apiUrl)
.then(response => response.json())
.then(data => {
    console.log("RISPOSTA COMPLETA:", data);

    const table = document.getElementById("wanalisTable");
    const thead = table.querySelector("thead");
    const tbody = table.querySelector("tbody");
    const loading = document.getElementById("loading");

    loading.style.display = "none";

    if (!data || data.length === 0) {
        loading.innerText = "Nessun dato trovato.";
        return;
    }

    // 🔹 Header dinamico
    const headerRow = document.createElement("tr");
    const columns = Object.keys(data[0]);

    columns.forEach(col => {
        const th = document.createElement("th");
        th.innerText = col;
        headerRow.appendChild(th);
    });
    thead.appendChild(headerRow);

    // 🔹 Righe dinamiche
    data.forEach(item => {
        const row = document.createElement("tr");
        columns.forEach(col => {
            const td = document.createElement("td");
            let value = item[col];

            if (value === null || value === undefined) {
                value = "";
            }

            // ✅ Colorazione per numeri
            if(["uscita","entrata","Importo EUR"].includes(col)) {
                const num = parseFloat(value);
                if (!isNaN(num)) {
                    if(num > 0) td.style.color = "green";
                    else if(num < 0) td.style.color = "red";
                    else td.style.color = "black";
                }
            }

            td.innerText = value;
            row.appendChild(td);
        });
        tbody.appendChild(row);
    });

    table.style.display = "table";

})
.catch(error => {
    console.error("Errore:", error);
    document.getElementById("loading").innerText = "Errore caricamento dati.";
});
</script>

</body>
</html>
