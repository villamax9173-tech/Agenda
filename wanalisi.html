<!DOCTYPE html>
<html lang="it">

<head>
<meta charset="UTF-8">
<title>Wanalisi</title>

<style>

body{
font-family:Arial;
margin:20px;
background:#f4f6f9;
}

h2{
text-align:center;
}

table{
width:100%;
border-collapse:collapse;
background:white;
}

th,td{
border:1px solid #ccc;
padding:8px;
font-size:14px;
}

th{
background:#2c7be5;
color:white;
}

.numero-positivo{color:green;font-weight:bold;}
.numero-negativo{color:red;font-weight:bold;}
.numero-zero{color:black;}

.totali{
display:flex;
justify-content:space-around;
margin-bottom:20px;
font-weight:bold;
}

.box{
background:white;
padding:10px 20px;
border-radius:6px;
box-shadow:0 2px 6px rgba(0,0,0,0.1);
}

</style>
</head>


<body>

<h2>Wanalisi</h2>

<div class="totali">
<div class="box">Tot Entrate: <span id="totEntrate">0</span></div>
<div class="box">Tot Uscite: <span id="totUscite">0</span></div>
<div class="box">Tot Importo EUR: <span id="totImporto">0</span></div>
</div>

<table>
<thead>
<tr>
<th>Data</th>
<th>Uscita</th>
<th>DescUscita</th>
<th>Causale</th>
<th>Importo EUR</th>
<th>Entrata</th>
<th>DescEntrata</th>
</tr>
</thead>

<tbody id="tabella"></tbody>
</table>


<script>

const apiUrl="https://agendavillamaxapi-dyhrhdhzdzewh5hz.canadacentral-01.azurewebsites.net/api/GetEventsWaNALIS?code=I-rrqvXKD9iosCOpeRZbyFEuhXI_HuPb2QZoGpMU95g9AzFuuPP7BQ==";

fetch(apiUrl)
.then(r=>r.json())
.then(data=>{

const tabella=document.getElementById("tabella")

let totEntrate=0
let totUscite=0
let totImporto=0

const visteEntrate=new Set()
const visteUscite=new Set()

data.sort((a,b)=> new Date(a.Idata)-new Date(b.Idata))

data.forEach(r=>{

const dataObj=new Date(r.Idata)
const dataVal=dataObj.toLocaleDateString("it-IT")

const uscita=Number(r.Uscita||0)
const entrata=Number(r.Entrata||0)
const importo=Number(r.ImportoEUR||0)

const descU=r.DescUscita||""
const descE=r.DescEntrata||""

const keyU=dataVal+"-"+descU
const keyE=dataVal+"-"+descE

let uscitaPrint=""
let descUPrint=""
let entrataPrint=""
let descEPrint=""

if(descU && descU!=="-" && !visteUscite.has(keyU)){
uscitaPrint=uscita
descUPrint=descU
visteUscite.add(keyU)
}

if(descE && descE!=="-" && !visteEntrate.has(keyE)){
entrataPrint=entrata
descEPrint=descE
visteEntrate.add(keyE)
}

totEntrate+=entrata
totUscite+=uscita
totImporto+=importo

const tr=document.createElement("tr")

tr.innerHTML=`
<td>${dataVal}</td>
<td class="${classe(uscitaPrint)}">${formatta(uscitaPrint)}</td>
<td>${descUPrint}</td>
<td>${r.Causale||""}</td>
<td class="${classe(importo)}">${formatta(importo)}</td>
<td class="${classe(entrataPrint)}">${formatta(entrataPrint)}</td>
<td>${descEPrint}</td>
`

tabella.appendChild(tr)

})

document.getElementById("totEntrate").innerText=totEntrate.toFixed(2)
document.getElementById("totUscite").innerText=totUscite.toFixed(2)
document.getElementById("totImporto").innerText=totImporto.toFixed(2)

})

function formatta(v){
if(v===0 || v==="") return ""
return Number(v).toFixed(2)
}

function classe(v){
if(v>0) return "numero-positivo"
if(v<0) return "numero-negativo"
return "numero-zero"
}

</script>

</body>
</html>
