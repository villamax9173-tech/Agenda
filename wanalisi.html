<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>Wanalisi</title>
</head>

<body>

<h2>Wanalisi</h2>

<div id="loading">Caricamento dati...</div>

<table border="1" cellpadding="6" cellspacing="0" id="wanalisTable" style="display:none;">
    <thead>
        <tr>
            <th>Data</th>
            <th>Causale</th>
            <th>Entrata</th>
            <th>Uscita</th>
            <th>Importo EUR</th>
        </tr>
    </thead>
    <tbody></tbody>
</table>

<script>

const apiUrl = "https://agendavillamaxapi-dyhrhdhzdzewh5hz.canadacentral-01.azurewebsites.net/api/GetEventsWaNALIS?code=I-rrqvXKD9iosCOpeRZbyFEuhXI_HuPb2QZoGpMU95g9AzFuuPP7BQ==";

// converte yyyy/MM/dd in oggetto Date sicuro
function parseDataYYYYMMDD(str) {
    if (!str) return null;
    const parts = str.split("/");
    return new Date(parts[0], parts[1] - 1, parts[2]);
}

fetch(apiUrl)
.then(response => response.json())
.then(data => {

    console.log("DATI:", data);

    const table = document.getElementById("wanalisTable");
    const tbody = table.querySelector("tbody");
    const loading = document.getElementById("loading");

    loading.style.display = "none";
    table.style.display = "table";

    data.forEach(item => {

        const row = document.createElement("tr");

        let dataFormattata = "";

        if (item.idata) {
            const dataObj = parseDataYYYYMMDD(item.idata);
            if (dataObj)
                dataFormattata = dataObj.toLocaleDateString("it-IT");
        }

        row.innerHTML = `
            <td>${dataFormattata}</td>
            <td>${item.causale || ""}</td>
            <td>${item.entrata || ""}</td>
            <td>${item.uscita || ""}</td>
            <td>${item.importoEUR || ""}</td>
        `;

        tbody.appendChild(row);
    });

})
.catch(error => {
    console.error("Errore:", error);
    document.getElementById("loading").innerText = "Errore caricamento dati.";
});

</script>

</body>
</html>
