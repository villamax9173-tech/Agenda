<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>Wanalisi</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
font-family: Arial;
background:#f4f6f8;
margin:0;
padding:20px;
text-align:center;
}

h1{
margin-bottom:20px;
}

.container{
max-width:1000px;
margin:auto;
}

.cards{
display:flex;
gap:10px;
justify-content:center;
flex-wrap:wrap;
margin-bottom:20px;
}

.card{
background:white;
padding:15px;
border-radius:8px;
box-shadow:0 2px 6px rgba(0,0,0,0.1);
min-width:150px;
}

.card h3{
margin:0;
font-size:14px;
color:#666;
}

.card p{
margin:5px 0 0 0;
font-size:22px;
font-weight:bold;
}

canvas{
background:white;
padding:10px;
border-radius:8px;
box-shadow:0 2px 6px rgba(0,0,0,0.1);
margin-bottom:20px;
max-width:100%;
height:320px !important;
}

button{
padding:10px 20px;
border:none;
background:#2d89ef;
color:white;
border-radius:6px;
cursor:pointer;
margin-bottom:20px;
}

table{
width:100%;
border-collapse:collapse;
background:white;
box-shadow:0 2px 6px rgba(0,0,0,0.1);
}

th,td{
padding:8px;
border-bottom:1px solid #ddd;
font-size:14px;
}

th{
background:#2d89ef;
color:white;
}

.past{
background:#f0f0f0;
color:#777;
}

@media (max-width:700px){

.cards{
flex-direction:column;
align-items:center;
}

table{
font-size:12px;
}

canvas{
height:260px !important;
}

}

</style>
</head>

<body>

<div class="container">

<h1>Buongiorno Wanalisi</h1>

<div class="cards">

<div class="card">
<h3>Saldo iniziale</h3>
<p id="saldoIniziale">0</p>
</div>

<div class="card">
<h3>Entrate</h3>
<p id="totEntrate">0</p>
</div>

<div class="card">
<h3>Uscite</h3>
<p id="totUscite">0</p>
</div>

<div class="card">
<h3>Saldo finale</h3>
<p id="saldoFinale">0</p>
</div>

</div>

<canvas id="grafico"></canvas>

<br>

<button onclick="caricaDati()">UPDATE</button>

<table id="tabella">
<thead>
<tr>
<th>Data</th>
<th>Entrata</th>
<th>Desc Entrata</th>
<th>Uscita</th>
<th>Desc Uscita</th>
</tr>
</thead>
<tbody></tbody>
</table>

</div>

<script>

let chart;

async function caricaDati(){

let response = await fetch("analisi.json");
let dati = await response.json();

let tbody = document.querySelector("#tabella tbody");
tbody.innerHTML="";

let oggi = new Date();

let totEntrate=0;
let totUscite=0;

let graficoCategorie = {};

dati.forEach(r=>{

let data = new Date(r.idata);

let tr=document.createElement("tr");

if(data < oggi){
tr.classList.add("past");
}

tr.innerHTML=`
<td>${r.idata}</td>
<td>${r.entrata}</td>
<td>${r.desc_entrata}</td>
<td>${r.uscita}</td>
<td>${r.desc_uscita}</td>
`;

tbody.appendChild(tr);

totEntrate += Number(r.entrata);
totUscite += Number(r.uscita);

if(data >= oggi && r.uscita > 0){

if(!graficoCategorie[r.desc_uscita]){
graficoCategorie[r.desc_uscita]=0;
}

graficoCategorie[r.desc_uscita]+=Number(r.uscita);

}

});

let saldoIniziale = 0;
let saldoFinale = saldoIniziale + totEntrate - totUscite;

document.getElementById("saldoIniziale").innerText = saldoIniziale.toFixed(2);
document.getElementById("totEntrate").innerText = totEntrate.toFixed(2);
document.getElementById("totUscite").innerText = totUscite.toFixed(2);
document.getElementById("saldoFinale").innerText = saldoFinale.toFixed(2);

disegnaGrafico(graficoCategorie);

}

function disegnaGrafico(categorie){

let labels = Object.keys(categorie);
let valori = Object.values(categorie);

if(chart){
chart.destroy();
}

chart = new Chart(document.getElementById("grafico"),{
type:"bar",
data:{
labels:labels,
datasets:[{
label:"Uscite future",
data:valori
}]
},
options:{
responsive:true,
plugins:{
legend:{
display:false
}
},
scales:{
y:{
beginAtZero:true
}
}
}
});

}

caricaDati();

</script>

</body>
</html>
