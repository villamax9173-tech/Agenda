<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>Wanalisi</title>

<style>

body{
font-family:Arial;
margin:20px;
background:#f5f6f8;
}

h2{
text-align:center;
}

table{
width:100%;
border-collapse:collapse;
background:white;
}

th,td{
border:1px solid #ccc;
padding:8px;
font-size:14px;
}

th{
background:#2c7be5;
color:white;
}

.numero-positivo{
color:green;
font-weight:bold;
}

.numero-negativo{
color:red;
font-weight:bold;
}

.numero-zero{
color:black;
}

.totali{
display:flex;
justify-content:space-around;
margin-bottom:20px;
font-weight:bold;
}

.box{
background:white;
padding:10px 20px;
border-radius:6px;
box-shadow:0 2px 6px rgba(0,0,0,0.1);
}

</style>
</head>

<body>

<h2>Wanalisi</h2>

<div class="totali">
<div class="box">Tot Entrate: <span id="totEntrate">0</span></div>
<div class="box">Tot Uscite: <span id="totUscite">0</span></div>
<div class="box">Tot Importo EUR: <span id="totImporto">0</span></div>
</div>

<table id="tabella">
<thead>
<tr>
<th>Data</th>
<th>Uscita</th>
<th>DescUscita</th>
<th>Causale</th>
<th>Importo EUR</th>
<th>Entrata</th>
<th>DescEntrata</th>
</tr>
</thead>
<tbody></tbody>
</table>

<script>

const apiUrl="https://agendavillamaxapi-dyhrhdhzdzewh5hz.canadacentral-01.azurewebsites.net/api/GetEventsWaNALIS?code=I-rrqvXKD9iosCOpeRZbyFEuhXI_HuPb2QZoGpMU95g9AzFuuPP7BQ==";

fetch(apiUrl)
.then(r=>r.json())
.then(data=>{

const tbody=document.querySelector("#tabella tbody")

let totEntrate=0
let totUscite=0
let totImporto=0

const visteEntrate=new Set()
const visteUscite=new Set()

data
.sort((a,b)=>a.idata.localeCompare(b.idata))
.forEach(r=>{

const dataVal=r.idata
const uscita=parseFloat(r.uscita||0)
const entrata=parseFloat(r.entrata||0)
const importo=parseFloat(r.importoEUR||0)

const descU=r.descUscita||""
const descE=r.descEntrata||""

const keyU=dataVal+"-"+descU
const keyE=dataVal+"-"+descE

let uscitaPrint=""
let descUPrint=""
let entrataPrint=""
let descEPrint=""

if(descU && !visteUscite.has(keyU))
{
uscitaPrint=uscita
descUPrint=descU
visteUscite.add(keyU)
}

if(descE && !visteEntrate.has(keyE))
{
entrataPrint=entrata
descEPrint=descE
visteEntrate.add(keyE)
}

totEntrate+=entrata
totUscite+=uscita
totImporto+=importo

const row=document.createElement("tr")

row.innerHTML=`
<td>${formatData(dataVal)}</td>

<td class="${classe(uscitaPrint)}">${formatNum(uscitaPrint)}</td>
<td>${descUPrint}</td>

<td>${r.causale||""}</td>

<td class="${classe(importo)}">${formatNum(importo)}</td>

<td class="${classe(entrataPrint)}">${formatNum(entrataPrint)}</td>
<td>${descEPrint}</td>
`

tbody.appendChild(row)

})

document.getElementById("totEntrate").innerText=totEntrate.toFixed(2)
document.getElementById("totUscite").innerText=totUscite.toFixed(2)
document.getElementById("totImporto").innerText=totImporto.toFixed(2)

})

function formatNum(v)
{
if(v===0||v==="") return ""
return Number(v).toFixed(2)
}

function classe(n)
{
if(n>0) return "numero-positivo"
if(n<0) return "numero-negativo"
return "numero-zero"
}

function formatData(d)
{
if(!d) return ""
if(d.length===8)
return d.substring(6,8)+"/"+d.substring(4,6)+"/"+d.substring(0,4)

return d
}

</script>

</body>
</html>
